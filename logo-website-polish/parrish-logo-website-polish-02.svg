<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="Parrish Projects polished website logo 02">
  <title>Parrish Projects polished website logo 02: Same logo, cleaner spacing</title>

  <defs>
    <linearGradient id="bg" x1="8" y1="5" x2="88" y2="93" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#30261A"/>
      <stop offset="0.54" stop-color="#17110C"/>
      <stop offset="1" stop-color="#090706"/>
    </linearGradient>
    <radialGradient id="glow" cx="70" cy="22" r="66" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF5A32" stop-opacity="0.26"/>
      <stop offset="0.48" stop-color="#B8350F" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#B8350F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="36" y1="24" x2="78" y2="75" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF7443"/>
      <stop offset="1" stop-color="#B8350F"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#100B08" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="4" y="4" width="88" height="88" rx="24" fill="url(#bg)" filter="url(#soft)"/>
  <rect x="4" y="4" width="88" height="88" rx="24" fill="url(#glow)"/>
  <rect x="5.25" y="5.25" width="85.5" height="85.5" rx="23" fill="none" stroke="#F3EEE4" stroke-opacity="0.15" stroke-width="1.5"/>

  <text x="15" y="68" font-family="Fraunces, Georgia, serif" font-size="50" font-weight="850" letter-spacing="-5.4" fill="#F3EEE4">P</text>
  <text x="43" y="68" font-family="Fraunces, Georgia, serif" font-size="50" font-weight="850" letter-spacing="-5.4" fill="url(#accent)">P</text>
  <path d="M23 76H73" stroke="#F3EEE4" stroke-opacity="0.15" stroke-width="2" stroke-linecap="round"/>

</svg>